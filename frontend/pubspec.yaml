name: exiled_drop
description: Self-hosted messenger for family & friends.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Networking
  http: ^1.4.0
  web_socket_channel: ^3.0.2

  # Storage
  shared_preferences: ^2.5.3

  # WebRTC
  flutter_webrtc: ^0.12.12

  # UI
  intl: ^0.20.2
  cupertino_icons: ^1.0.8
  firebase_core: ^4.6.0
  firebase_messaging: ^16.1.3
  flutter_local_notifications: ^21.0.0
  permission_handler: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
