# ── Server ──
server.port=8080

# ── Database ──
spring.datasource.url=jdbc:postgresql://localhost:5432/exileddrop
spring.datasource.username=exileddrop
spring.datasource.password=exileddrop_secret
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── Flyway ──
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ── JWT ──
app.jwt.secret=CHANGE_ME_IN_PRODUCTION_use_at_least_64_characters_of_random_hex_here_please
app.jwt.access-token-expiry=604800000
app.jwt.refresh-token-expiry=31536000000

# ── CORS (for Flutter web dev) ──
app.cors.allowed-origins=http://localhost:3000,http://localhost:8080

# ── WebRTC / TURN ──
app.turn.url=turn:localhost:3478
app.turn.username=exileddrop
app.turn.credential=turnpassword

# ── Logging ──
logging.level.com.exileddrop=DEBUG
logging.level.org.springframework.web.socket=DEBUG
